name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run

  doc:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly # nightly is required for coverage(off)
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - run: cargo llvm-cov nextest --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage-optout:
    name: Tests excluded from coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Every test module must opt out of coverage
        run: |
          if rg -U --pcre2 -n '#\[cfg\(test\)\]\n\s*mod tests \{' src/; then
            echo "::error::The 'mod tests' above is missing #[cfg_attr(coverage_nightly, coverage(off))]"
            exit 1
          fi
          echo "OK: all 'mod tests' modules opt out of coverage"

  ci-success:
    name: CI success
    if: always()
    needs: [fmt, clippy, test, doc, coverage, coverage-optout]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          if ! echo "$results" | jq -e 'all(. == "success")'; then
            echo "One or more jobs failed: $results"
            exit 1
          fi
