# git-cliff configuration — https://git-cliff.org
# Generates a changelog from Conventional Commits (which this repo enforces via
# the pr-title workflow), grouped by type with links back to the commits.

[changelog]
header = "# Changelog\n\n"
body = """
{% if version %}\
    ## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
            {% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}\
    {% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Strip the conventional-commit prefix; grouping captures the type already.
commit_preprocessors = []
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^doc", group = "Documentation" },
    { message = "^test", group = "Testing" },
    { message = "^ci|^build", group = "CI/Build" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore|^style", skip = true },
    { body = ".*security", group = "Security" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "[0-9]+.[0-9]+.[0-9]+"
topo_order = false
sort_commits = "oldest"
